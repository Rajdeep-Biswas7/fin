version: "3.9"

services:
  db:
    image: postgres:15
    container_name: finpilot_db
    restart: always
    environment:
      POSTGRES_USER: finpilot
      POSTGRES_PASSWORD: finpilot123
      POSTGRES_DB: finpilot
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: finpilot_redis
    restart: always
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    container_name: finpilot_backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://finpilot:finpilot123@db:5432/finpilot
      REDIS_URL: redis://redis:6379
      SECRET_KEY: your-super-secret-key-change-in-production
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    depends_on:
      - db
      - redis
    volumes:
      - ./backend:/app

  frontend:
    build: ./frontend
    container_name: finpilot_frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - backend

volumes:
  postgres_data:
